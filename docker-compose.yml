services:
  backend:
    build:
      context: ./backend
    container_name: emoji_dodge_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      - CORS_ORIGIN=http://localhost:5173
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: emoji_dodge_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
